<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NoDice</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0c0c1a;
  color: #e4d8c0;
  font-family: 'Courier New', monospace;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HUD ─────────────────────────────────────────────── */
.hud {
  display: flex;
  justify-content: space-around;
  padding: 10px 8px;
  background: #151525;
  border-bottom: 1px solid #2a2a40;
  flex-shrink: 0;
}
.hud-cell { text-align: center; }
.hud-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #5a5a80; }
.hud-val   { font-size: 19px; font-weight: bold; line-height: 1.2; }

.c-yellow { color: #f5c542; }
.c-green  { color: #4ade80; }
.c-red    { color: #f87171; }
.c-purple { color: #c084fc; }
.c-blue   { color: #60a5fa; }
.c-dim    { color: #5a5a80; }

/* ── Blind bar ───────────────────────────────────────── */
.blind-bar {
  padding: 5px 12px;
  background: #151525;
  border-bottom: 1px solid #2a2a40;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  flex-shrink: 0;
}
.blind-name { font-weight: bold; font-size: 13px; white-space: nowrap; }
.prog-wrap  { flex: 1; height: 6px; background: #2a2a40; border-radius: 3px; overflow: hidden; }
.prog-fill  { height: 100%; background: #4ade80; border-radius: 3px; transition: width .3s; }
.dice-count { font-size: 11px; color: #5a5a80; white-space: nowrap; }

/* ── Gems row ────────────────────────────────────────── */
.gems-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 5px 10px;
  background: #0c0c1a;
  border-bottom: 1px solid #1a1a2e;
  flex-shrink: 0;
  min-height: 28px;
  align-items: center;
}
.gem-chip {
  background: #1e1e35; border: 1px solid #3a3a60;
  border-radius: 5px; padding: 2px 7px; font-size: 10px;
  cursor: default; position: relative;
}
.gem-chip:hover .gem-tip { display: block; }
.gem-tip {
  display: none; position: absolute; bottom: 100%; left: 0;
  background: #2a2a45; border: 1px solid #4a4a70;
  border-radius: 6px; padding: 5px 8px; font-size: 10px;
  white-space: nowrap; z-index: 50; margin-bottom: 3px; color: #ccc;
}

/* ── Dice area ───────────────────────────────────────── */
.dice-area {
  flex: 1;
  display: flex; flex-wrap: wrap; gap: 7px;
  padding: 12px;
  justify-content: center; align-content: center;
  overflow-y: auto;
  cursor: pointer;
  position: relative;
}
.dice-area.is-rolling { cursor: wait; }

.die {
  width: 52px; height: 52px; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: bold;
  border: 2px solid rgba(255,255,255,.12);
  animation: revealDie .25s ease-out both;
  user-select: none; flex-shrink: 0;
}
.die.sm { width: 38px; height: 38px; font-size: 16px; border-radius: 8px; }
.die.xs { width: 26px; height: 26px; font-size: 11px; border-radius: 6px; }
.die.spawned { border-style: dashed; opacity: .82; }

.die-normal { background: #222238; color: #e4d8c0; }
.die-blue   { background: #0e1e38; color: #60a5fa; }
.die-red    { background: #301010; color: #f87171; }
.die-green  { background: #0e2810; color: #4ade80; }
.die-purple { background: #1c0c2e; color: #c084fc; }

@keyframes revealDie {
  from { transform: scale(.4) rotate(-25deg); opacity: 0; }
  to   { transform: scale(1)  rotate(0);      opacity: 1; }
}

.roll-hint {
  position: absolute; bottom: 8px; left: 0; right: 0;
  text-align: center; font-size: 12px; color: #4a4a70;
  animation: breathe 2s infinite;
}
.overflow-note {
  width: 100%; text-align: center;
  font-size: 11px; color: #5a5a80; padding: 4px 0;
}
.die.is-rolling { animation: none; }
@keyframes breathe { 0%,100%{opacity:.35} 50%{opacity:.9} }

/* ── Score panel ─────────────────────────────────────── */
.score-panel {
  background: #151525; border-top: 1px solid #2a2a40;
  padding: 8px 16px; flex-shrink: 0;
  min-height: 62px;
}
.score-main  { font-size: 32px; font-weight: bold; color: #f5c542; text-align: center; }
.score-combo { font-size: 12px; color: #c084fc; text-align: center; margin-top: 1px; }
.score-break { font-size: 11px; color: #5a5a80; text-align: center; margin-top: 2px; }

/* ── Action bar ──────────────────────────────────────── */
.actions {
  padding: 10px 16px;
  display: flex; gap: 10px; justify-content: center; align-items: center;
  flex-shrink: 0;
  background: #0c0c1a;
  border-top: 1px solid #1a1a2e;
}
.btn {
  padding: 11px 22px; border-radius: 10px; border: none;
  font-family: inherit; font-size: 14px; font-weight: bold;
  text-transform: uppercase; letter-spacing: .8px;
  cursor: pointer; transition: transform .1s;
}
.btn:active  { transform: scale(.96); }
.btn:disabled{ opacity: .3; cursor: default; }
.btn-roll  { background: #f5c542; color: #0c0c1a; }
.btn-next  { background: #4ade80; color: #0c0c1a; }
.btn-shop  { background: #c084fc; color: #0c0c1a; }

/* ── Shop overlay ────────────────────────────────────── */
.shop-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.86);
  display: flex; align-items: flex-end; z-index: 100;
}
.shop-sheet {
  background: #151525; width: 100%; max-width: 480px; margin: 0 auto;
  border-radius: 18px 18px 0 0; padding: 18px 16px;
  max-height: 88vh; overflow-y: auto;
}
.shop-title { font-size: 21px; color: #f5c542; font-weight: bold; text-align: center; }
.shop-money { font-size: 13px; color: #4ade80; text-align: center; margin: 3px 0 14px; }
.shop-grid  { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.shop-card  {
  background: #1e1e35; border: 1px solid #3a3a60;
  border-radius: 10px; padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.shop-card.sold { opacity: .35; }
.shop-iname { font-weight: bold; font-size: 13px; }
.shop-idesc { font-size: 11px; color: #7a7090; margin-top: 2px; }
.shop-right { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
.shop-price { font-size: 16px; color: #f5c542; font-weight: bold; white-space: nowrap; }
.btn-buy {
  background: #f5c542; color: #0c0c1a;
  border: none; border-radius: 7px;
  padding: 6px 11px; font-family: inherit;
  font-size: 12px; font-weight: bold; cursor: pointer;
  white-space: nowrap;
}
.btn-buy:disabled { background: #2a2a45; color: #5a5a80; cursor: default; }

/* ── Game over ───────────────────────────────────────── */
.gameover {
  position: fixed; inset: 0; background: rgba(0,0,0,.93);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200; text-align: center; padding: 28px;
}
.gameover h1 { font-size: 50px; color: #f87171; margin-bottom: 6px; }
.go-sub   { font-size: 14px; color: #7a7090; margin-bottom: 4px; }
.go-score { font-size: 22px; color: #e4d8c0; margin-bottom: 14px; }
.seed-box {
  background: #1e1e35; border-radius: 10px;
  padding: 10px 20px; margin: 0 0 18px;
  font-size: 12px; color: #7a7090;
}
.seed-box b { color: #f5c542; font-size: 17px; display: block; margin-top: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ─── SEEDED PRNG (mulberry32) ──────────────────────────
function makePRNG(seed) {
  let s = seed >>> 0;
  function next() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }
  return {
    next,
    int:  n => Math.floor(next() * n),
    bool: p => next() < p,
    pick: a => a[Math.floor(next() * a.length)],
    shuffle(a) {
      const r = [...a];
      for (let i = r.length - 1; i > 0; i--) {
        const j = Math.floor(next() * (i + 1));
        [r[i], r[j]] = [r[j], r[i]];
      }
      return r;
    },
  };
}

// ─── DICE DEFINITIONS ─────────────────────────────────
const DICE = {
  normal: { name: 'Normal', faces: [1,2,3,4,5,6],   isMult: false },
  blue:   { name: 'Blue',   faces: [1,3,5,7,9,11],  isMult: false },
  red:    { name: 'Red',    faces: [2,4,6,8,10,12], isMult: false },
  green:  { name: 'Green',  faces: [1,1,1,3,3,3],   isMult: false },
  purple: { name: 'Purple', faces: [1,2,3,4,5,6],   isMult: true  },
};
const BUYABLE_DICE = ['blue', 'red', 'green', 'purple'];

function rollDie(type, rng, spawned = false) {
  const f = DICE[type].faces;
  return { type, value: f[rng.int(f.length)], spawned };
}

// ─── GEM DEFINITIONS ──────────────────────────────────
// phase: 'spawn' → returns new dice to add
//        'modify' → mutates dice in place, returns nothing
//        'score'  → mutates scoreInfo in place
const GEMS = {
  oneseed: {
    name: 'Oneseed',
    desc: 'Each rolled 1 spawns a Normal die',
    cost: 5, phase: 'spawn',
    run: (dice, rng) => dice
      .filter(d => !d.spawned && d.value === 1)
      .map(() => rollDie('normal', rng, true)),
  },
  verdant: {
    name: 'Verdant',
    desc: 'Each Green 3 has a 1/3 chance to spawn a Green die',
    cost: 6, phase: 'spawn',
    run: (dice, rng) => dice
      .filter(d => !d.spawned && d.type === 'green' && d.value === 3 && rng.bool(1/3))
      .map(() => rollDie('green', rng, true)),
  },
  multiseed: {
    name: 'Multiseed',
    desc: 'Each non-purple 6 spawns a Purple die',
    cost: 8, phase: 'spawn',
    run: (dice, rng) => dice
      .filter(d => !d.spawned && d.value === 6 && d.type !== 'purple')
      .map(() => rollDie('purple', rng, true)),
  },
  crimson: {
    name: 'Crimson',
    desc: 'Red dice each add +2 to their value',
    cost: 5, phase: 'modify',
    run: (dice) => dice.forEach(d => { if (d.type === 'red') d.value += 2; }),
  },
  azure: {
    name: 'Azure',
    desc: 'Blue dice each add +1 per additional Blue die',
    cost: 6, phase: 'modify',
    run: (dice) => {
      const n = dice.filter(d => d.type === 'blue').length;
      if (n > 1) dice.forEach(d => { if (d.type === 'blue') d.value += n - 1; });
    },
  },
  cascade: {
    name: 'Cascade',
    desc: 'Any combo gives +1 to hand mult (stackable)',
    cost: 7, phase: 'score',
    run: (info) => { if (info.combo !== 'none') info.handMult++; },
  },
};

// ─── SCORING ENGINE ────────────────────────────────────
// Designed for high die counts: O(n) passes, no per-die DOM work.
function scoreRoll(diceTypes, gemIds, rng, bossEffect) {
  // 1. Roll
  let dice = diceTypes.map(t => rollDie(t, rng, false));

  // 2. Boss: min value = 2
  if (bossEffect === 'min2') {
    dice.forEach(d => { if (d.value < 2) d.value = 2; });
  }

  // 3. Spawn gems (spawned dice don't trigger further spawns)
  for (const id of gemIds) {
    const g = GEMS[id];
    if (g && g.phase === 'spawn') {
      dice = dice.concat(g.run(dice, rng));
    }
  }

  // 4. Modify gems (run once on full dice list)
  for (const id of gemIds) {
    const g = GEMS[id];
    if (g && g.phase === 'modify') g.run(dice);
  }

  // 5. Sum additive, product multiplicative
  let addSum = 0, multProd = 1;
  for (const d of dice) {
    if (DICE[d.type].isMult) multProd *= d.value;
    else addSum += d.value;
  }

  // 6. Combination detection (frequency of face values)
  const freq = new Map();
  for (const d of dice) freq.set(d.value, (freq.get(d.value) || 0) + 1);
  const maxFreq = freq.size ? Math.max(...freq.values()) : 0;

  let combo, handMult;
  if      (maxFreq >= 4) { combo = 'FOUR OF A KIND'; handMult = 5; }
  else if (maxFreq >= 3) { combo = 'THREE OF A KIND'; handMult = 3; }
  else if (maxFreq >= 2) { combo = 'PAIR';            handMult = 2; }
  else                   { combo = 'none';            handMult = 1; }

  // Boss: no combos
  if (bossEffect === 'nocombo') { combo = 'none'; handMult = 1; }

  // 7. Score gems
  const info = { combo, handMult };
  for (const id of gemIds) {
    const g = GEMS[id];
    if (g && g.phase === 'score') g.run(info);
  }

  const score = Math.floor(addSum * multProd * info.handMult);
  return { dice, addSum, multProd, combo: info.combo, handMult: info.handMult, score };
}

// ─── ROUND CONFIG ──────────────────────────────────────
const THRESHOLDS = [15, 30, 60, 110, 190, 320, 520, 840, 1360, 2200];
function getThreshold(round) {
  if (round <= THRESHOLDS.length) return THRESHOLDS[round - 1];
  return Math.floor(THRESHOLDS.at(-1) * Math.pow(1.65, round - THRESHOLDS.length));
}
function isBoss(round) { return round % 3 === 0; }

const BOSS_EFFECTS = [
  { id: 'thresh', label: 'Score threshold ×1.5' },
  { id: 'nocombo', label: 'No combinations count this round' },
  { id: 'min2',   label: 'All dice minimum face value is 2' },
];
function bossForRound(round) {
  return BOSS_EFFECTS[Math.floor(round / 3 - 1) % BOSS_EFFECTS.length];
}
function effectiveThreshold(round) {
  let t = getThreshold(round);
  if (isBoss(round) && bossForRound(round).id === 'thresh') t = Math.floor(t * 1.5);
  return t;
}

// ─── SHOP GENERATION ──────────────────────────────────
function genShop(rng) {
  const dieType = rng.pick(BUYABLE_DICE);
  const gemKeys = rng.shuffle(Object.keys(GEMS));
  const items = [
    {
      kind: 'die', id: dieType,
      name: DICE[dieType].name + ' Die',
      desc: 'Faces: ' + [...new Set(DICE[dieType].faces)].join(', ') +
            (DICE[dieType].isMult ? ' (multiplier)' : ''),
      cost: 4,
    },
    ...gemKeys.slice(0, 3).map(id => ({
      kind: 'gem', id,
      name: GEMS[id].name,
      desc: GEMS[id].desc,
      cost: GEMS[id].cost,
    })),
  ];
  return rng.shuffle(items);
}

// ─── GAME STATE ────────────────────────────────────────
let G;
let _animTimer = null;

function newGame() {
  const seed = (Math.floor(Math.random() * 0xFFFFFF) + 1) >>> 0;
  G = {
    seed,
    rng: makePRNG(seed),
    round: 1,
    handsLeft: 5,
    totalScore: 0,
    money: 5,
    diceTypes: ['normal'],
    gemIds: [],
    phase: 'idle',  // idle | rolling | scored | roundWon | shop | gameover
    lastRoll: null,
    shopItems: null,
  };
  render();
}

// ─── ACTIONS ───────────────────────────────────────────
function animateRollingDice() {
  const el = document.querySelector('.dice-area');
  if (!el) return;
  const n = G.diceTypes.length;
  const size = n > 50 ? 'xs' : n > 20 ? 'sm' : '';
  let html = '';
  for (const t of G.diceTypes) {
    const faces = DICE[t].faces;
    const val = faces[Math.floor(Math.random() * faces.length)];
    const cls = ['die', `die-${t}`, 'is-rolling', size].filter(Boolean).join(' ');
    html += `<div class="${cls}">${dieFace(t, val)}</div>`;
  }
  html += `<div class="roll-hint">Rolling...</div>`;
  el.innerHTML = html;
}

function doRoll() {
  if (G.phase !== 'idle' && G.phase !== 'scored') return;
  if (G.handsLeft <= 0) return;
  G.phase = 'rolling';
  render();
  animateRollingDice();
  _animTimer = setInterval(animateRollingDice, 80);
  setTimeout(() => {
    clearInterval(_animTimer);
    _animTimer = null;
    const boss = isBoss(G.round) ? bossForRound(G.round).id : null;
    const roll = scoreRoll(G.diceTypes, G.gemIds, G.rng, boss);
    G.lastRoll = roll;
    G.totalScore += roll.score;
    G.handsLeft--;
    const thresh = effectiveThreshold(G.round);
    if (G.totalScore >= thresh)  G.phase = 'roundWon';
    else if (G.handsLeft === 0)  G.phase = 'gameover';
    else                         G.phase = 'scored';
    render();
  }, 550);
}

function enterShop() {
  G.money += G.handsLeft;
  if (isBoss(G.round)) G.money += 3;
  G.shopItems = genShop(G.rng);
  G.phase = 'shop';
  render();
}

function buyItem(idx) {
  const item = G.shopItems[idx];
  if (!item || item.bought || G.money < item.cost) return;
  G.money -= item.cost;
  item.bought = true;
  if (item.kind === 'die') G.diceTypes.push(item.id);
  else G.gemIds.push(item.id);
  render();
}

function leaveShop() {
  G.round++;
  G.handsLeft = 5;
  G.totalScore = 0;
  G.lastRoll = null;
  G.shopItems = null;
  G.phase = 'idle';
  render();
}

function onAreaClick() {
  if (G.phase === 'idle' || G.phase === 'scored') doRoll();
}

// ─── RENDERING ─────────────────────────────────────────
const NORMAL_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

function dieFace(type, value) {
  if (type === 'normal' && value >= 1 && value <= 6) return NORMAL_FACES[value - 1];
  if (DICE[type].isMult) return `×${value}`;
  return value;
}

function dieEl(d, size) {
  const cls = ['die', `die-${d.type}`, size, d.spawned ? 'spawned' : '']
    .filter(Boolean).join(' ');
  return `<div class="${cls}">${dieFace(d.type, d.value)}</div>`;
}

function renderDiceGrid(dice) {
  const n = dice.length;
  const size = n > 50 ? 'xs' : n > 20 ? 'sm' : '';
  const limit = 150;
  let html = '';
  for (let i = 0; i < Math.min(n, limit); i++) html += dieEl(dice[i], size);
  if (n > limit) html += `<div class="overflow-note">+${n - limit} more dice</div>`;
  return html;
}

function renderIdleDice() {
  return G.diceTypes.map(t => {
    const mid = Math.floor(DICE[t].faces.length / 2);
    return dieEl({ type: t, value: DICE[t].faces[mid], spawned: false },
                 G.diceTypes.length > 20 ? 'sm' : '');
  }).join('');
}

function render() {
  const thresh  = effectiveThreshold(G.round);
  const boss    = isBoss(G.round);
  const progress = Math.min(1, G.totalScore / thresh);
  const r = G.lastRoll;

  const blindNames = ['Small Blind', 'Big Blind', 'Boss Blind'];
  const blindName  = boss ? 'Boss Blind' : blindNames[(G.round - 1) % 3];

  let h = '';

  // HUD
  h += `<div class="hud">
    <div class="hud-cell">
      <div class="hud-label">Round</div>
      <div class="hud-val ${boss ? 'c-red' : 'c-yellow'}">${G.round}</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Score</div>
      <div class="hud-val c-yellow">${G.totalScore.toLocaleString()}</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Need</div>
      <div class="hud-val c-dim">${thresh.toLocaleString()}</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Hands</div>
      <div class="hud-val ${G.handsLeft <= 1 ? 'c-red' : 'c-green'}">${G.handsLeft}</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">Money</div>
      <div class="hud-val c-green">$${G.money}</div>
    </div>
  </div>`;

  // Blind bar
  h += `<div class="blind-bar">
    <span class="blind-name ${boss ? 'c-red' : ''}">${blindName}</span>
    <div class="prog-wrap"><div class="prog-fill" style="width:${(progress*100).toFixed(1)}%"></div></div>
    <span class="dice-count">${G.diceTypes.length}d</span>
  </div>`;

  // Boss condition banner
  if (boss) {
    const be = bossForRound(G.round);
    h += `<div style="background:#2a1010;border-bottom:1px solid #5a2020;padding:4px 12px;
                      font-size:11px;color:#f87171;flex-shrink:0">
      ⚠ ${be.label}
    </div>`;
  }

  // Gems row
  h += `<div class="gems-row">`;
  if (G.gemIds.length === 0) {
    h += `<span class="c-dim" style="font-size:10px">No gems yet</span>`;
  } else {
    for (const id of G.gemIds) {
      h += `<div class="gem-chip">${GEMS[id].name}<div class="gem-tip">${GEMS[id].desc}</div></div>`;
    }
  }
  h += `</div>`;

  // Dice area
  const canRoll = G.phase === 'idle' || G.phase === 'scored';
  h += `<div class="dice-area${G.phase === 'rolling' ? ' is-rolling' : ''}" onclick="onAreaClick()">`;
  if (G.phase === 'rolling') {
    // animateRollingDice() takes over immediately after render — show placeholders
    h += renderIdleDice();
    h += `<div class="roll-hint">Rolling...</div>`;
  } else if (G.phase === 'idle' && !G.lastRoll) {
    h += `<div style="width:100%;text-align:center;font-size:10px;color:#4a4a70;margin-bottom:6px;letter-spacing:1px">YOUR DICE (${G.diceTypes.length})</div>`;
    h += renderIdleDice();
    h += `<div class="roll-hint">tap to roll</div>`;
  } else if (canRoll && G.lastRoll) {
    h += renderDiceGrid(G.lastRoll.dice);
    h += `<div class="roll-hint">tap to roll again</div>`;
  } else if (r) {
    h += renderDiceGrid(r.dice);
  }
  h += `</div>`;

  // Score panel
  h += `<div class="score-panel">`;
  if (r) {
    h += `<div class="score-main">${r.score.toLocaleString()}</div>`;
    if (r.combo !== 'none') {
      h += `<div class="score-combo">${r.combo} ×${r.handMult}</div>`;
    }
    let bd = `${r.addSum}`;
    if (r.multProd > 1) bd += ` × ${r.multProd} (purple)`;
    if (r.handMult > 1) bd += ` × ${r.handMult} (combo)`;
    h += `<div class="score-break">${bd} = ${r.score.toLocaleString()}</div>`;
  } else {
    h += `<div class="score-main c-dim">—</div>`;
    h += `<div class="score-break">need ${thresh.toLocaleString()} over ${G.handsLeft} hands</div>`;
  }
  h += `</div>`;

  // Actions
  h += `<div class="actions">`;
  if (G.phase === 'idle') {
    h += `<button class="btn btn-roll" onclick="doRoll()">Roll ×${G.handsLeft}</button>`;
  } else if (G.phase === 'scored') {
    h += `<button class="btn btn-roll" onclick="doRoll()">Roll Again ×${G.handsLeft}</button>`;
  } else if (G.phase === 'roundWon') {
    h += `<div style="font-size:12px;color:#4ade80">+$${G.handsLeft} earned</div>`;
    h += `<button class="btn btn-shop" onclick="enterShop()">Shop →</button>`;
  }
  h += `</div>`;

  // Shop overlay
  if (G.phase === 'shop') h += renderShop();

  // Game over overlay
  if (G.phase === 'gameover') {
    h += `<div class="gameover">
      <h1>GAME OVER</h1>
      <div class="go-sub">Reached Round ${G.round}</div>
      <div class="go-score">${G.totalScore.toLocaleString()} / ${thresh.toLocaleString()}</div>
      <div class="seed-box">Seed<b>${G.seed}</b></div>
      <button class="btn btn-roll" onclick="newGame()">Play Again</button>
    </div>`;
  }

  document.getElementById('app').innerHTML = h;
}

function renderShop() {
  let h = `<div class="shop-overlay"><div class="shop-sheet">
    <div class="shop-title">Shop</div>
    <div class="shop-money">$${G.money} to spend</div>
    <div class="shop-grid">`;

  for (let i = 0; i < G.shopItems.length; i++) {
    const it = G.shopItems[i];
    const ok = !it.bought && G.money >= it.cost;
    h += `<div class="shop-card${it.bought ? ' sold' : ''}">
      <div>
        <div class="shop-iname">${it.name}</div>
        <div class="shop-idesc">${it.desc}</div>
      </div>
      <div class="shop-right">
        <span class="shop-price">$${it.cost}</span>
        <button class="btn-buy" onclick="buyItem(${i})" ${ok ? '' : 'disabled'}>
          ${it.bought ? 'Sold' : 'Buy'}
        </button>
      </div>
    </div>`;
  }

  h += `</div>
    <button class="btn btn-next" style="width:100%" onclick="leaveShop()">Continue →</button>
  </div></div>`;
  return h;
}

newGame();
</script>
</body>
</html>
